name: Deploy OneStop Web Apps
on:
  push:
    branches:
      - main
jobs:
  lint:
    name: Run Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint client
        run: pnpm lint:client

      - name: Run lint admin
        run: pnpm lint:admin

  build:
    name: Build apps
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v6

        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --prod --frozen-lockfile

      - name: Build client
        run: pnpm build:client

      - name: Build admin
        run: pnpm build:admin

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.PROJECT_PATH }}
            git pull
            pnpm install --prod --frozen-lockfile 
            pnpm build:client
            pnpm build:admin
            pm2 restart client
            pm2 restart admin
            pm2 save
