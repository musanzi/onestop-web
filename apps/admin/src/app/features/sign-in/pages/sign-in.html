<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="mb-8 flex flex-col items-center justify-center gap-3">
      <div class="flex items-center gap-3">
        <div class="relative w-8 h-10">
          <img ngSrc="/images/logo/logo-g.png" alt="Company Logo" class="w-8 h-10" width="469" height="532" />
        </div>
        <span class="font-bold text-2xl text-gray-900">Se connecter</span>
      </div>
    </div>
    @if (isCheckingAuth()) {
    <div
      class="fixed inset-0 z-9999 flex items-center justify-center bg-[radial-gradient(ellipse_at_center,var(--color-white)_0%,var(--color-gray-50)_100%)]"
    >
      <div class="flex flex-col items-center gap-8 rounded-3xl p-12">
        <div class="relative flex items-center justify-center">
          <svg viewBox="0 0 50 50" class="size-12 drop-shadow-[0_2px_8px_var(--color-primary-200)]">
            <defs>
              <linearGradient id="spinner-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="theme('colors.primary.400')" />
                <stop offset="100%" stop-color="theme('colors.primary.600')" />
              </linearGradient>
            </defs>
            <circle cx="25" cy="25" r="20" fill="none" stroke="var(--color-gray-200)" stroke-width="3" />
            <circle
              cx="25"
              cy="25"
              r="20"
              class="origin-center animate-spin"
              fill="none"
              stroke="url(#spinner-gradient)"
              stroke-width="3"
              stroke-linecap="round"
              stroke-dasharray="80 150"
            />
          </svg>
        </div>
        <div class="flex flex-col items-center gap-2 text-center">
          <span class="text-base font-medium tracking-tight text-gray-800">
            Vérification de votre session
            <span class="ml-1 inline-flex gap-1">
              <span class="inline-block size-1 animate-bounce rounded-full bg-gray-400"></span>
              <span class="inline-block size-1 animate-bounce rounded-full bg-gray-400 [animation-delay:200ms]"></span>
              <span class="inline-block size-1 animate-bounce rounded-full bg-gray-400 [animation-delay:400ms]"></span>
            </span>
          </span>
        </div>
      </div>
    </div>
    } @else {
    <div class="p-8 bg-white rounded-2xl shadow-xl shadow-gray-900/5 border border-gray-100 overflow-hidden">
      <form [formGroup]="form" class="flex flex-col gap-5" (ngSubmit)="onSignIn()" novalidate>
        <app-ui-input
          [id]="'email'"
          label="Adresse e-mail"
          type="email"
          formControlName="email"
          placeholder="admin@admin.com"
          [invalid]="(form.get('email')?.invalid && form.get('email')?.touched) || false"
        />
        <app-ui-password
          label="Mot de passe"
          [id]="'password'"
          formControlName="password"
          placeholder="••••••••••"
          [invalid]="(form.get('password')?.invalid && form.get('password')?.touched) || false"
        />
        <div class="mt-2 flex flex-col gap-5">
          <app-ui-button
            class="w-full"
            type="submit"
            [variant]="'primary'"
            [disabled]="store.isLoading() || form.invalid"
            [loading]="store.isLoading()"
          >
            Se connecter
          </app-ui-button>
          <div class="flex items-center">
            <div class="flex-auto border-t border-gray-200"></div>
            <div class="text-sm text-gray-600 mx-4">Ou</div>
            <div class="flex-auto border-t border-gray-200"></div>
          </div>
          <app-ui-button [variant]="'outlined'" class="w-full" type="button" (click)="signinWithGoogle()">
            <div class="relative h-5 w-5">
              <img ngSrc="/images/google.svg" alt="Google" width="20" height="20" class="h-5 w-5" />
            </div>
            <span class="-ml-1"> oogle</span>
          </app-ui-button>
        </div>
      </form>
    </div>
    }
  </div>
</div>
