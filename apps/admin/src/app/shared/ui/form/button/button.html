<button
  [type]="type()"
  [disabled]="disabled() || loading()"
  class="relative inline-flex w-full cursor-pointer items-center justify-center gap-1 overflow-hidden rounded-lg border font-medium leading-6 shadow-sm focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:outline-none disabled:cursor-not-allowed disabled:opacity-50 disabled:shadow-none"
  [class]="
    (size() === 'small'
      ? 'min-h-8 px-3.5 py-2 text-sm'
      : size() === 'large'
        ? 'min-h-12 px-6 py-3 text-base'
        : 'min-h-10 px-5 py-2.5 text-[15px]') +
    ' ' +
    (outlined()
      ? variant() === 'danger'
        ? 'border-red-600 bg-white text-red-700 hover:not-disabled:border-red-700 hover:not-disabled:bg-red-50 focus:ring-red-500'
        : variant() === 'info'
          ? 'border-blue-600 bg-white text-blue-700 hover:not-disabled:border-blue-700 hover:not-disabled:bg-blue-50 focus:ring-blue-500'
          : variant() === 'contrast'
            ? 'border-slate-300 bg-white text-slate-900 hover:not-disabled:border-slate-500 hover:not-disabled:bg-slate-50 focus:ring-slate-700'
            : variant() === 'success'
              ? 'border-green-600 bg-white text-green-700 hover:not-disabled:border-green-700 hover:not-disabled:bg-green-50 focus:ring-green-500'
              : variant() === 'secondary'
                ? 'border-gray-200 bg-white text-gray-700 hover:not-disabled:bg-slate-100 focus:ring-gray-500'
                : 'border-primary-400 bg-white text-primary-700 hover:not-disabled:shadow-md focus:ring-primary-500'
      : text()
        ? variant() === 'danger'
          ? 'border-transparent bg-transparent text-red-700 shadow-none hover:not-disabled:bg-red-50 focus:ring-red-500'
          : variant() === 'info'
            ? 'border-transparent bg-transparent text-blue-700 shadow-none hover:not-disabled:bg-blue-50 focus:ring-blue-500'
            : variant() === 'contrast'
              ? 'border-transparent bg-transparent text-slate-900 shadow-none hover:not-disabled:bg-slate-100 focus:ring-slate-700'
              : variant() === 'success'
                ? 'border-transparent bg-transparent text-green-700 shadow-none hover:not-disabled:bg-green-50 focus:ring-green-500'
                : variant() === 'secondary'
                  ? 'border-transparent bg-transparent text-slate-700 shadow-none hover:not-disabled:bg-slate-100 focus:ring-slate-500'
                  : 'border-transparent bg-transparent text-primary-700 shadow-none hover:not-disabled:bg-primary-50 focus:ring-primary-500'
        : variant() === 'danger'
          ? 'border-red-600 bg-red-600 text-white focus:ring-red-500'
          : variant() === 'info'
            ? 'border-blue-600 bg-blue-600 text-white focus:ring-blue-500'
            : variant() === 'contrast'
              ? 'border-slate-900 bg-slate-900 text-white focus:ring-slate-700'
              : variant() === 'success'
                ? 'border-green-600 bg-green-600 text-white focus:ring-green-500'
                : variant() === 'secondary'
                  ? 'border-gray-300 bg-gray-400 text-white focus:ring-gray-500'
                  : variant() === 'outlined'
                    ? 'border-gray-200 bg-white shadow-sm'
                    : 'border-primary-600 bg-primary-600 text-white focus:ring-primary-500')
  "
  (click)="handleClick($event)">
  @if (loading()) {
    <i-lucide [name]="icons.LoaderCircle" [size]="spinnerSize()" class="animate-spin" />
  }
  <ng-content />
</button>
