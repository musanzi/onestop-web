<div class="flex flex-col gap-2">
  @if (label()) {
  <label [for]="id()" class="block text-sm font-semibold text-gray-700">
    {{ label() }} @if (required()) {
    <span class="text-red-500">*</span>
    }
  </label>
  }
  <textarea
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [id]="id()"
    autocomplete="off"
    [rows]="rows()"
    class="min-h-28 w-full resize-y rounded-lg border border-slate-300 bg-white px-2.5 py-1.5 text-[15px] leading-6 text-slate-900 shadow-sm transition-colors duration-200 placeholder:text-slate-400 hover:border-slate-400/90 hover:shadow-sm focus:border-primary-500 focus:ring-2 focus:ring-primary-200 focus:ring-offset-1 focus:outline-none disabled:cursor-not-allowed disabled:border-slate-200 disabled:bg-slate-50 disabled:opacity-60 disabled:shadow-none"
    [class.border-red-500]="invalid()"
    [class.bg-red-50]="invalid()"
    [class.focus:border-red-600]="invalid()"
    [class.focus:ring-red-200]="invalid()"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onTouched()"></textarea>
</div>
