<div class="space-y-2">
  @if (label()) {
  <label [for]="id()" class="block text-sm font-semibold text-gray-700">
    {{ label() }} @if (required()) {
    <span class="text-red-500">*</span>
    }
  </label>
  }
  <div class="relative">
    <input
      [type]="isMasked() ? 'password' : 'text'"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [id]="id()"
      [autocomplete]="'off'"
      class="w-full rounded-lg border border-slate-300 bg-white px-3.5 py-2.5 pr-10 text-[15px] leading-6 text-slate-900 shadow-sm transition-colors duration-200 placeholder:text-slate-400 hover:border-slate-400/90 hover:shadow-sm focus:border-primary-500 focus:ring-2 focus:ring-primary-200 focus:ring-offset-1 focus:outline-none disabled:cursor-not-allowed disabled:border-slate-200 disabled:bg-slate-50 disabled:opacity-60 disabled:shadow-none"
      [class.border-red-500]="invalid()"
      [class.bg-red-50]="invalid()"
      [class.focus:border-red-600]="invalid()"
      [class.focus:ring-red-200]="invalid()"
      [value]="value"
      (input)="onInput($event)"
    />
    <button
      type="button"
      (click)="toggleMask()"
      [disabled]="disabled()"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors rounded p-1"
      [attr.aria-label]="isMasked() ? 'Show password' : 'Hide password'"
    >
      @if (isMasked()) {
      <i-lucide [name]="icons.Eye" class="size-5" />
      } @else {
      <i-lucide [name]="icons.EyeOff" class="size-5" />
      }
    </button>
  </div>
</div>
