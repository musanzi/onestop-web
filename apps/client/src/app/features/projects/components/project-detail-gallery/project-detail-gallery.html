@if (project().gallery && project().gallery.length > 0) {
<div class="space-y-4 rounded-2xl border border-gray-200 bg-white p-3 sm:p-4">
  <figure class="relative h-80 w-full overflow-hidden rounded-xl bg-gray-100 md:h-[30rem]">
    <img
      [src]="project().gallery[activeIndex()] | apiIMG: 'gallery'"
      [alt]="project().gallery[activeIndex()].image || project().name || 'gallery image'"
      class="h-full w-full object-cover"
      loading="eager"
      fetchpriority="high" />
  </figure>
  <div class="flex flex-wrap gap-3">
    @for (img of project().gallery; track img.id; let idx = $index) {
    <button
      type="button"
      (click)="activeIndex.set(idx)"
      class="overflow-hidden rounded-xl border-2 transition"
      [class.border-primary-500]="idx === activeIndex()"
      [class.border-transparent]="idx !== activeIndex()">
      <img
        [src]="img | apiIMG: 'gallery'"
        [alt]="img.image || 'thumbnail'"
        class="h-20 w-20 object-cover"
        loading="lazy" />
    </button>
    }
  </div>
</div>
} @else {
<figure class="relative h-80 w-full overflow-hidden rounded-2xl border border-gray-200 bg-gray-100 md:h-[34rem]">
  <img
    [src]="project() | apiIMG: 'project'"
    [alt]="project().name"
    class="object-cover w-full h-full"
    loading="eager"
    fetchpriority="high" />
</figure>
}
