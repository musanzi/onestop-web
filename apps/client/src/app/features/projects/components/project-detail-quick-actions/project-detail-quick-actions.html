<div class="rounded-2xl border border-gray-200 bg-white p-6 transition-colors duration-200 hover:border-gray-300">
  <div class="flex flex-col gap-5">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center">
          <i-lucide [name]="icons.squaresSubtract" class="size-5 stroke-[1.5]"></i-lucide>
        </div>
        <div>
          <h3 class="font-bold text-lg text-gray-900">{{ 'project_detail.detail.actions_status' | translate }}</h3>
          <p class="text-sm text-gray-500">{{ 'project_detail.detail.quick_actions' | translate }}</p>
        </div>
      </div>
      <span
        class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border text-sm font-semibold"
        [ngClass]="statusBadgeClasses()">
        {{ projectStatus() }}
      </span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <button
        type="button"
        class="flex items-center justify-center gap-2 rounded-xl bg-primary-600 px-4 py-3 font-semibold text-white transition-colors duration-200 hover:bg-primary-700 disabled:cursor-not-allowed disabled:bg-gray-400"
        (click)="onAddToCalendar()"
        [disabled]="projectStatus() === 'Terminé'">
        <i-lucide class="size-5" [name]="icons.calendarSync"></i-lucide>
        <span class="text-sm">{{ 'project_detail.detail.add_to_calendar' | translate }}</span>
      </button>
      <button
        type="button"
        class="flex items-center justify-center gap-2 rounded-xl border border-gray-300 px-4 py-3 font-semibold text-gray-700 transition-colors duration-200 hover:border-gray-400 hover:bg-gray-50"
        (click)="onShare()">
        <i-lucide class="size-5" [name]="icons.share"></i-lucide>
        <span class="text-sm">{{ 'project_detail.detail.share_project' | translate }}</span>
      </button>
    </div>

    @if (isProjectOpen()) {
    <div class="pt-4 border-t border-gray-200">
      <button
        type="button"
        class="flex w-full items-center justify-center gap-2 rounded-xl bg-primary-600 px-5 py-3 font-bold text-white transition-colors duration-200 hover:bg-primary-700"
        (click)="onApply()">
        <i-lucide class="size-5" [name]="icons.userPlus"></i-lucide>
        <span>{{ 'project_detail.detail.apply_now' | translate }}</span>
      </button>
      <p class="text-xs text-gray-500 text-center mt-2">{{ 'project_detail.detail.cta_hint' | translate }}</p>
    </div>
    }
  </div>
</div>
