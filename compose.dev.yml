services:
  client:
    container_name: onestop-client
    build:
      context: .
      target: development
    restart: unless-stopped
    command: pnpm dev:client --host=0.0.0
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - /app/node_modules

  admin:
    container_name: onestop-admin
    build:
      context: .
      target: development
    restart: unless-stopped
    command: pnpm dev:admin --host=0.0.0
    ports:
      - '4100:4100'
    volumes:
      - .:/app
      - /app/node_modules
