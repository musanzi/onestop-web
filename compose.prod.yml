services:
  website:
    container_name: onestop-admin
    build:
      context: .
      target: production
    restart: unless-stopped
    command: pnpm ssr:client --host=0.0.0
    ports:
      - '4200:4200'

  admin:
    container_name: onestop-admin
    build:
      context: .
      target: production
    restart: unless-stopped
    command: pnpm ssr:admin --host=0.0.0
    ports:
      - '4300:4300'
